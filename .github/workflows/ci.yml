name: CI

on:
  push:
    branches: [main, ui-redesign, chore/publish-mcp-cli]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm install --no-audit --no-fund

      # The committed lockfile was generated on macOS and omits the Linux native
      # binaries Tailwind v4 needs at build time; npm's optional-dep lockfile bug
      # (npm/cli#4828) means neither `ci` nor `install` reliably fetches them.
      # Install them explicitly, matched to the resolved package versions.
      - name: Install Linux native binaries (lightningcss / tailwind oxide)
        run: |
          npm install --no-save --no-audit \
            "lightningcss-linux-x64-gnu@$(node -p "require('lightningcss/package.json').version")"
          OXIDE_VER=$(node -p "require('@tailwindcss/oxide/package.json').version" 2>/dev/null || echo "")
          if [ -n "$OXIDE_VER" ]; then
            npm install --no-save --no-audit "@tailwindcss/oxide-linux-x64-gnu@$OXIDE_VER"
          fi

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - run: npm run build:verify
