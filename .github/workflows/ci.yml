name: CI

on:
  push:
    branches: [main, ui-redesign, chore/publish-mcp-cli]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      # `npm ci` (deterministic, installs devDependencies like ts-jest from the
      # lockfile). It cannot fix the missing Linux native binaries below, but
      # switching to `npm install` dropped ts-jest in CI - so keep ci and patch
      # the natives separately.
      - run: npm ci

      # The committed lockfile was generated on macOS and omits the Linux native
      # binaries Tailwind v4 needs at build time (npm's optional-dep lockfile bug,
      # npm/cli#4828). Install them explicitly, matched to the resolved versions.
      # --no-save --no-package-lock so this doesn't perturb the ci-installed tree.
      - name: Install Linux native binaries (lightningcss / tailwind oxide)
        run: |
          npm install --no-save --no-package-lock --no-audit \
            "lightningcss-linux-x64-gnu@$(node -p "require('lightningcss/package.json').version")"
          OXIDE_VER=$(node -p "require('@tailwindcss/oxide/package.json').version" 2>/dev/null || echo "")
          if [ -n "$OXIDE_VER" ]; then
            npm install --no-save --no-package-lock --no-audit "@tailwindcss/oxide-linux-x64-gnu@$OXIDE_VER"
          fi

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - run: npm run build:verify
