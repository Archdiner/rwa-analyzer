name: CI

on:
  push:
    branches: [main, ui-redesign, chore/publish-mcp-cli]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # `npm install` (not `npm ci`) so npm re-resolves platform-specific optional
      # deps: the committed lockfile was generated on macOS and omits the Linux
      # native binaries (e.g. lightningcss-linux-x64-gnu), which `npm ci` follows
      # strictly, leaving the build to fail on the missing .node at runtime.
      - run: npm install --no-audit --no-fund

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - run: npm run build:verify
